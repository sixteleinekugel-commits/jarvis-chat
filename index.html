<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mistral AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  text-align: center;
  background: #020617;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  max-width: 70%;
  padding: 12px 16px;
  margin: 10px 0;
  border-radius: 15px;
  line-height: 1.4;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

#input-area {
  display: flex;
  padding: 15px;
  background: #020617;
  border-top: 1px solid #1e293b;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

button {
  margin-left: 10px;
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}
</style>

</head>

<body>

<header>🤖 Mistral AI</header>

<div id="chat"></div>

<div id="input-area">
  <input id="prompt" placeholder="Écris ton message..." />
  <button onclick="sendMessage()">Envoyer</button>
</div>

<script>
const API_URL = "https://remedies-completion-perceived-conscious.trycloudflare.com/v1/chat/completions";

let messages = [];

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("prompt");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  messages.push({ role: "user", content: text });

  const loadingId = Date.now();
  addMessage("⏳ L'IA réfléchit...", "bot");

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: messages,
        temperature: 0.7
      })
    });

    const data = await res.json();

    // supprime le message "loading"
    document.getElementById("chat").lastChild.remove();

    const reply = data.choices[0].message.content;

    addMessage(reply, "bot");
    messages.push({ role: "assistant", content: reply });

  } catch (err) {
    document.getElementById("chat").lastChild.remove();
    addMessage("❌ Erreur serveur", "bot");
    console.error(err);
  }
}

// envoyer avec Entrée
document.getElementById("prompt").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
