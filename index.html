<!DOCTYPE html>
<html>
<head>
  <title>Mistral Chat</title>
</head>
<body>

<h1>💬 Mon IA Mistral</h1>

<input id="prompt" placeholder="Écris ton message..." style="width:300px;">
<button onclick="sendMessage()">Envoyer</button>

<pre id="response"></pre>

<script>
const API_URL = "https://remedies-completion-perceived-conscious.trycloudflare.com/v1/chat/completions";

async function sendMessage() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      messages: [
        { role: "user", content: prompt }
      ],
      temperature: 0.7
    })
  });

  const data = await res.json();
  document.getElementById("response").innerText =
    data.choices[0].message.content;
}
</script>

</body>
</html>
