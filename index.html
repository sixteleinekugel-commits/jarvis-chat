<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mistral AI</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui;
  background: #0b0f19;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: rgba(20, 25, 40, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #1f2937;
}

header button {
  background: #ef4444;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  display: flex;
  margin-bottom: 15px;
  align-items: flex-start;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  margin-right: 10px;
  flex-shrink: 0;
}

.user-avatar { background: #2563eb; }
.bot-avatar { background: #10b981; }

.bubble {
  padding: 12px 15px;
  border-radius: 15px;
  max-width: 75%;
  line-height: 1.5;
}

.user .bubble {
  background: #2563eb;
  margin-left: auto;
}

.bot .bubble {
  background: #1f2937;
}

#input-area {
  display: flex;
  padding: 15px;
  background: rgba(20,25,40,0.8);
  border-top: 1px solid #1f2937;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button.send {
  margin-left: 10px;
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button.send:disabled {
  background: #555;
}

.typing {
  opacity: 0.6;
  font-style: italic;
}
</style>
</head>

<body>

<header>
  <div>🤖 Mistral AI</div>
  <button onclick="clearChat()">Reset</button>
</header>

<div id="chat"></div>

<div id="input-area">
  <input id="prompt" placeholder="Écris ton message..." />
  <button class="send" onclick="sendMessage()">Envoyer</button>
</div>

<script>
const API_URL = "https://remedies-completion-perceived-conscious.trycloudflare.com/v1/chat/completions";

let messages = JSON.parse(localStorage.getItem("chat")) || [];

const chat = document.getElementById("chat");

function saveChat() {
  localStorage.setItem("chat", JSON.stringify(messages));
}

function createMessage(text, role, typing=false) {
  const wrapper = document.createElement("div");
  wrapper.className = "message " + role;

  const avatar = document.createElement("div");
  avatar.className = "avatar " + (role === "user" ? "user-avatar" : "bot-avatar");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  if (typing) bubble.classList.add("typing");
  bubble.innerText = text;

  if (role === "user") {
    wrapper.appendChild(bubble);
    wrapper.appendChild(avatar);
  } else {
    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
  }

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;

  return bubble;
}

function renderHistory() {
  chat.innerHTML = "";
  messages.forEach(m => {
    createMessage(m.content, m.role === "user" ? "user" : "bot");
  });
}

async function sendMessage() {
  const input = document.getElementById("prompt");
  const btn = document.querySelector(".send");

  const text = input.value.trim();
  if (!text) return;

  createMessage(text, "user");
  messages.push({ role: "user", content: text });
  saveChat();

  input.value = "";
  btn.disabled = true;

  const typingBubble = createMessage("L'IA écrit...", "bot", true);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages, temperature: 0.7 })
    });

    const data = await res.json();
    const reply = data.choices[0].message.content;

    typingBubble.innerText = "";
    
    // effet écriture
    let i = 0;
    const speed = 15;
    function type() {
      if (i < reply.length) {
        typingBubble.innerText += reply.charAt(i);
        i++;
        setTimeout(type, speed);
      }
    }
    type();

    messages.push({ role: "assistant", content: reply });
    saveChat();

  } catch (err) {
    typingBubble.innerText = "❌ Erreur serveur";
    console.error(err);
  }

  btn.disabled = false;
}

function clearChat() {
  messages = [];
  saveChat();
  chat.innerHTML = "";
}

document.getElementById("prompt").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// chargement historique
renderHistory();
</script>

</body>
</html>
